        /* ───────── Binary Rain Background ───────── */
        function BinaryRain() {
            const canvasRef = useRef(null);

            const draw = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');

                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                const fontSize = 14;
                const columns = Math.floor(canvas.width / fontSize);
                const drops = Array.from({ length: columns }, () => Math.random() * -100);
                const speeds = Array.from({ length: columns }, () => 0.3 + Math.random() * 0.7);
                const chars = '01';

                function animate() {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    for (let i = 0; i < columns; i++) {
                        const char = chars[Math.floor(Math.random() * chars.length)];
                        const x = i * fontSize;
                        const y = drops[i] * fontSize;

                        const brightness = 0.15 + Math.random() * 0.25;
                        const r = Math.floor(6 + Math.random() * 8);
                        const g = Math.floor(160 + Math.random() * 60);
                        const b = Math.floor(200 + Math.random() * 55);
                        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${brightness})`;
                        ctx.font = `${fontSize}px monospace`;
                        ctx.fillText(char, x, y);

                        if (y > canvas.height && Math.random() > 0.98) {
                            drops[i] = 0;
                        }
                        drops[i] += speeds[i];
                    }
                    requestAnimationFrame(animate);
                }

                const animId = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animId);
            }, []);

            useEffect(() => {
                const cleanup = draw();
                const handleResize = () => {
                    const canvas = canvasRef.current;
                    if (canvas) {
                        canvas.width = window.innerWidth;
                        canvas.height = window.innerHeight;
                    }
                };
                window.addEventListener('resize', handleResize);
                return () => {
                    if (cleanup) cleanup();
                    window.removeEventListener('resize', handleResize);
                };
            }, [draw]);

            return (
                <canvas ref={canvasRef} style={{ position: 'fixed', inset: 0, zIndex: 1, pointerEvents: 'none', opacity: 0.7 }} />
            );
        }

        /* ───────── Animated Section Wrapper ───────── */
        function AnimatedSection({ children, className = '' }) {
            const ref = useRef(null);
            const isInView = useInView(ref, { once: true, margin: '-100px' });
            return (
                <motion.div
                    ref={ref}
                    initial={{ opacity: 0, y: 50 }}
                    animate={isInView ? { opacity: 1, y: 0 } : { opacity: 0, y: 50 }}
                    transition={{ duration: 0.6, ease: 'easeOut' }}
                    className={className}
                >
                    {children}
                </motion.div>
            );
        }

        /* ───────── SVG Arrow Components ───────── */

                                <p className="text-lg max-w-lg mx-auto mb-10" style={{ color: '#d1d5db' }}>Join the future of cybersecurity with PhishGuard's intelligent protection system.</p>
                                <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                    <motion.a href={`mailto:${EMAIL}`} className="cta-button cta-primary" whileHover={{ scale: 1.05 }} whileTap={{ scale: 0.95 }}>📧 Contact</motion.a>
                                    <motion.a href={PPT_URL} download className="cta-button cta-secondary" whileHover={{ scale: 1.05 }} whileTap={{ scale: 0.95 }}>📊 View Presentation</motion.a>
                                </div>
                            </div>
                        </div>
                    </section>
                </AnimatedSection>
            );
        }

        /* ═══════════════════════════════════════════════════════
           SECTION 9: FOOTER
           ═══════════════════════════════════════════════════════ */
        function Footer() {
            return (
                <footer className="site-footer relative z-10">
                    <p className="text-lg mb-2">Made with <span style={{ color: '#FF4D4D' }}>❤️</span> <span className="text-gradient" style={{ cursor: 'pointer' }}><a href="https://vcet.ac.in/" target="_blank" rel="noopener noreferrer" style={{ WebkitTextFillColor: 'inherit', textDecoration: 'none' }}>VCET</a></span></p>
                    <p className="text-sm mb-2" style={{ color: '#9ca3af' }}>PhishGuard © 2026. Privacy-First Cybersecurity.</p>
                    <a href={`mailto:${EMAIL}`} className="text-sm transition-colors duration-300 hover:opacity-80" style={{ color: '#06b6d4' }}>{EMAIL}</a>
                </footer>
            );
        }

        /* ═══════════════════════════════════════════════════════
           APP ROOT
           ═══════════════════════════════════════════════════════ */
        function App() {
            return (
                <div className="relative min-h-screen" style={{ background: '#000000' }}>
                    <div className="electron-bg" />
                    <BinaryRain />
                    <main>
                        <HeroSection />
                        <AboutSection />
                        <HowItWorksSection />
                        <FeaturesSection />
                        <TRLSection />
                        <DemoDownloadSection />
                        <ContactTeamSection />
                        <FinalCTASection />
                        <Footer />
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
